<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería Multimedia NoSQL</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

  <h1 class="text-3xl font-bold text-center text-blue-700 mb-8">🎵 Galería Multimedia NoSQL</h1>

  <!-- Formulario -->
  <div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow-md mb-10">
    <h2 class="text-xl font-bold mb-4 text-gray-800">Subir Elemento</h2>
    <input type="text" id="titulo" placeholder="Título" class="w-full border p-2 rounded mb-3">
    <textarea id="descripcion" placeholder="Descripción" class="w-full border p-2 rounded mb-3"></textarea>
    <label class="block font-medium mb-1">Imagen (PNG/JPG):</label>
    <input type="file" id="imagen" accept="image/*" class="w-full mb-3">
    <label class="block font-medium mb-1">Audio (MP3/WAV):</label>
    <input type="file" id="audio" accept="audio/*" class="w-full mb-3">
    <button onclick="subirElemento()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">
      ☁️ Guardar en la Nube
    </button>
  </div>

  <!-- Galería -->
  <div id="galeria" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto"></div>

  <script src="app.js"></script>
</body>
</html>
